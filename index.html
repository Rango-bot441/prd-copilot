<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>PRD Copilot</title><style>:root{--ink:#171717;--muted:#68635b;--line:#d7d0c3;--paper:#f5efe2;--panel:#fffaf0;--accent:#e14d2a;--green:#1f7a5c;--shadow:0 22px 70px rgba(44,35,23,.13)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(90deg,rgba(23,23,23,.045) 1px,transparent 1px),linear-gradient(rgba(23,23,23,.04) 1px,transparent 1px),radial-gradient(circle at 18% 12%,rgba(225,77,42,.13),transparent 28%),radial-gradient(circle at 86% 22%,rgba(36,95,143,.12),transparent 24%),var(--paper);background-size:34px 34px,34px 34px,auto,auto,auto}button,textarea,input,select{font:inherit}.shell{max-width:1500px;margin:0 auto;padding:26px}.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.stamp{width:54px;height:54px;border:2px solid var(--ink);border-radius:8px;display:grid;place-items:center;background:#fff7e6;box-shadow:7px 7px 0 rgba(225,77,42,.25);font-weight:950}h1{margin:0;font-size:clamp(34px,5vw,68px);line-height:.9}.subtitle{margin:8px 0 0;color:var(--muted);font-size:15px}.status-strip{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(255,250,240,.86);color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap}.workspace{display:grid;grid-template-columns:minmax(300px,.85fr) minmax(360px,1fr) minmax(420px,1.18fr);gap:14px;align-items:start}.panel{border:1px solid var(--line);border-radius:8px;background:rgba(255,250,240,.94);box-shadow:var(--shadow);overflow:hidden}.panel-header{min-height:76px;padding:17px;border-bottom:1px solid var(--line);background:linear-gradient(100deg,#fff4dc,#fffaf0 58%,#eef5ef);display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{margin:0;font-size:21px;line-height:1.1;display:inline-flex;align-items:center;gap:9px}.number{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:white;background:var(--ink);font-size:14px;box-shadow:4px 4px 0 rgba(23,23,23,.15)}.panel-body{padding:17px}.field{margin-bottom:14px}label{display:block;margin-bottom:7px;font-size:13px;font-weight:900}textarea,input,select{width:100%;border:1px solid #cfc4b3;border-radius:8px;background:#fffdf7;color:var(--ink);outline:none;padding:12px}textarea:focus,input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(225,77,42,.12)}textarea{min-height:154px;resize:vertical;line-height:1.58}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:10px;margin-top:16px}.btn{border:0;border-radius:8px;padding:12px 14px;min-height:44px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.primary{flex:1;color:#fffaf0;background:var(--accent);box-shadow:0 12px 28px rgba(225,77,42,.26)}.secondary{color:var(--ink);background:#ece1ce;border:1px solid #d8cab5}.ghost{color:#a7341d;background:#fff1e8;border:1px solid rgba(225,77,42,.24)}.score-board{display:grid;grid-template-columns:.9fr 1.1fr;gap:12px;margin-bottom:14px}.score-card,.block,.prd-section{border:1px solid var(--line);border-radius:8px;background:#fffdf7;padding:14px}.score-card{min-height:142px}.score-label{color:var(--muted);font-size:12px;font-weight:900}.score-value{margin:10px 0 4px;font-size:48px;line-height:1;font-weight:950}.score-card p,.note,.empty{color:var(--muted);line-height:1.55;font-size:13px;margin:0}.meter{height:12px;border-radius:999px;background:#eadfca;overflow:hidden;margin-top:13px}.meter span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--green))}.block{margin-bottom:12px}.block h3{margin:0 0 11px;font-size:15px;display:inline-flex;padding:6px 9px;border-radius:8px;color:#a7341d;background:#fff0e8}.list{margin:0;padding:0;list-style:none;display:grid;gap:8px}.list li{border:1px solid #eadbc5;border-radius:8px;background:#fff8ed;padding:10px;color:#4f473e;font-size:13px;line-height:1.45}.list strong{display:block;margin-bottom:4px;color:var(--ink)}.question{display:grid;grid-template-columns:auto 1fr;gap:9px}.question:before{content:"?";width:22px;height:22px;border-radius:7px;display:grid;place-items:center;background:var(--ink);color:#fffaf0;font-weight:900}.chips{display:flex;flex-wrap:wrap;gap:7px}.chip{border-radius:999px;padding:7px 9px;background:#eef5ef;color:var(--green);font-size:12px;font-weight:900}.prd-actions{display:flex;gap:8px;flex-wrap:wrap}.prd-doc{max-height:720px;overflow:auto;padding-right:5px}.prd-section{border-left:4px solid var(--ink);margin-bottom:11px}.prd-section h3{margin:0 0 8px;font-size:16px}.prd-section p,.prd-section li{color:#4e473d;font-size:13px;line-height:1.58}.prd-section p{margin:0}.prd-section ul{margin:8px 0 0;padding-left:18px}.empty{border:1px dashed #cabda9;border-radius:8px;padding:16px;background:rgba(255,253,247,.76)}.copy-box{display:none;width:100%;min-height:150px;margin-top:10px}.copy-box.active{display:block}@media(max-width:1160px){.workspace{grid-template-columns:1fr}.prd-doc{max-height:none}}@media(max-width:640px){.shell{padding:16px}.topbar{align-items:flex-start;flex-direction:column}.two,.score-board{grid-template-columns:1fr}.actions{flex-direction:column}}</style></head>
<body><main class="shell"><header class="topbar"><div class="brand"><div class="stamp">PRD</div><div><h1>PRD Copilot</h1><p class="subtitle">把一句模糊需求，澄清成需求卡、追问清单、指标和完整 PRD</p></div></div><div class="status-strip"><span class="pill">作品集原型</span><span class="pill">纯前端</span><span class="pill">无需 API Key</span></div></header><section class="workspace"><section class="panel"><div class="panel-header"><h2 class="panel-title"><span class="number">1</span>输入模糊需求</h2><span class="pill" id="caseLabel">自定义输入</span></div><div class="panel-body"><div class="field"><label for="rawNeed">一句话需求</label><textarea id="rawNeed" placeholder="例如：我想做一个 AI 选题推荐功能，帮助创作者更快找到选题。"></textarea></div><div class="two"><div class="field"><label for="domain">业务场景</label><select id="domain"><option>创作者工具</option><option>内容安全</option><option>数据分析</option><option>运营工具</option><option>企业效率</option><option>教育学习</option><option>电商转化</option><option>其他</option></select></div><div class="field"><label for="stage">需求阶段</label><select id="stage"><option>只有想法</option><option>已有业务背景</option><option>已有原型</option><option>准备评审</option></select></div></div><div class="field"><label for="knownInfo">已知补充信息</label><textarea id="knownInfo" placeholder="可选：目标用户、当前痛点、业务目标、限制条件、想看的指标..."></textarea></div><div class="actions"><button class="btn primary" id="analyzeBtn">生成澄清与 PRD</button><button class="btn secondary" id="sampleBtn">换个样例</button></div><p class="note" style="margin-top:12px;">建议用你正在投递岗位相关的场景，比如创作者成长、内容安全、AI 数据复盘。</p></div></section><section class="panel" id="clarifyPanel"><div class="panel-header"><h2 class="panel-title"><span class="number">2</span>需求澄清 Copilot</h2><span class="pill" id="clarifyStatus">等待分析</span></div><div class="panel-body" id="clarifyResult"><div class="empty">输入需求后，系统会判断需求成熟度，列出缺失信息、建议追问问题，并生成一张可进入 PRD 的需求卡。</div></div></section><section class="panel" id="prdPanel"><div class="panel-header"><h2 class="panel-title"><span class="number">3</span>PRD Builder</h2><div class="prd-actions"><button class="btn ghost" id="copyPrdBtn" type="button">复制 PRD</button><button class="btn secondary" id="downloadBtn" type="button">导出 MD</button></div></div><div class="panel-body"><div class="prd-doc" id="prdResult"><div class="empty">PRD 会在这里生成。它会包含背景、目标用户、用户场景、产品目标、功能范围、流程、指标、风险和验收标准。</div></div><textarea class="copy-box" id="copyFallback" readonly></textarea></div></section></section></main><script>const cases=[{label:"创作者选题",domain:"创作者工具",stage:"只有想法",rawNeed:"我想做一个 AI 选题推荐功能，帮助创作者更快找到每天要拍什么。",knownInfo:"目标用户是抖音中腰部创作者。希望推荐结果不只是标题，还要说明为什么适合这个账号。"},{label:"内容安全",domain:"内容安全",stage:"已有业务背景",rawNeed:"我想做一个发布前内容安全检测工具，帮助创作者检查标题、脚本和评论引导里的风险表达。",knownInfo:"需要识别夸大承诺、诱导互动、财经健康等敏感表达，并给出更稳妥的改写建议。"},{label:"数据复盘",domain:"数据分析",stage:"已有业务背景",rawNeed:"我想做一个创作者内容复盘助手，根据播放、完播、点赞、评论、转粉数据给出下一轮创作建议。",knownInfo:"用户不会看复杂数据，希望系统直接告诉他哪类内容有效、下次该优化标题还是脚本。"},{label:"运营提效",domain:"运营工具",stage:"准备评审",rawNeed:"我们想做一个运营需求池，统一收集业务同学提的功能需求，并帮助产品判断优先级。",knownInfo:"需要支持需求录入、自动补充问题、优先级评分、PRD 草稿生成和评审摘要。"}];const fieldSignals=[{key:"targetUser",label:"目标用户",words:["用户","创作者","运营","团队","学生","商家","面试官","HR","内容团队"]},{key:"problem",label:"用户痛点",words:["痛点","问题","困难","不知道","不会","成本","风险","效率","麻烦"]},{key:"goal",label:"产品目标",words:["目标","提升","降低","提高","帮助","减少","转化","增长"]},{key:"scope",label:"功能范围",words:["功能","支持","输入","输出","检测","推荐","生成","看板","复制"]},{key:"metric",label:"指标",words:["指标","采纳率","发布率","完播率","转粉","点击","留存","满意度","转化率"]},{key:"risk",label:"风险边界",words:["风险","边界","限制","合规","安全","不包含","失败","异常"]},{key:"validation",label:"验收标准",words:["验收","判断","成功","有效","验证","通过","测试"]}];const domainPresets={"创作者工具":{user:"抖音中腰部创作者",problem:"创作者缺少稳定选题来源，难以判断选题是否适合自己的账号阶段。",goal:"提升选题效率、发布频率和内容质量。",primaryMetric:"推荐后发布率"},"内容安全":{user:"需要发布短视频内容的创作者和内容运营",problem:"创作者不清楚哪些表达存在平台风险，也不知道如何改得更稳妥。",goal:"降低发布前合规判断成本，并提升风险提示的可执行性。",primaryMetric:"有效改写采纳率"},"数据分析":{user:"需要复盘内容表现的创作者和运营人员",problem:"用户能看到数据，但难以从数据中判断下一轮应该优化什么。",goal:"把复杂数据转化为清晰的内容复盘结论和下一步动作。",primaryMetric:"复盘建议采纳率"},"运营工具":{user:"业务运营、产品经理和协作团队",problem:"需求来源分散、表述不完整，导致评审和排期成本高。",goal:"提高需求录入质量和产品评审效率。",primaryMetric:"需求一次评审通过率"},"企业效率":{user:"企业内部协作人员",problem:"跨团队任务信息不完整，协作过程容易反复沟通。",goal:"提升任务对齐效率和交付透明度。",primaryMetric:"任务一次澄清完成率"},"教育学习":{user:"学习者和教学运营",problem:"学习目标和学习路径不清晰，难以持续反馈和调整。",goal:"帮助用户形成可执行的学习计划和反馈闭环。",primaryMetric:"学习计划完成率"},"电商转化":{user:"电商商家和转化运营",problem:"用户决策链路长，商品卖点和转化动作不清晰。",goal:"提升商品表达效率和转化路径完成率。",primaryMetric:"商品详情页转化率"},"其他":{user:"目标业务用户",problem:"需求仍处于早期，需要进一步明确用户、场景和成功标准。",goal:"把模糊想法转化为可评审的产品方案。",primaryMetric:"需求成熟度提升率"}};const $=id=>document.getElementById(id);let caseIndex=-1,latestPrdMarkdown="";function escapeHtml(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}function loadCase(i=0){const item=cases[i%cases.length];caseIndex=i%cases.length;$("caseLabel").textContent=item.label;$("domain").value=item.domain;$("stage").value=item.stage;$("rawNeed").value=item.rawNeed;$("knownInfo").value=item.knownInfo}function analyzeCompleteness(text){const matched=fieldSignals.map(s=>({...s,hit:s.words.some(w=>text.includes(w))}));const hitCount=matched.filter(i=>i.hit).length;const lengthBonus=Math.min(16,Math.floor(text.length/32));const score=Math.min(96,Math.max(18,hitCount*11+lengthBonus+12));return{matched,missing:matched.filter(i=>!i.hit),score}}function extractFeature(rawNeed,domain){let feature=rawNeed.replace(/[。！？!?]/g," ").trim();["我想做一个","我们想做一个","想做一个","做一个","需要一个","希望做一个"].forEach(p=>{if(feature.includes(p))feature=feature.split(p).pop()});feature=feature.split(/[，,；;]/)[0].trim();return(!feature||feature.length>26)?`${domain}智能助手`:feature}function buildQuestions(missing,preset,feature){const base={targetUser:`这个功能优先服务哪类用户？是 ${preset.user}，还是还有更细分的人群？`,problem:`用户在没有「${feature}」之前，最具体、最高频的痛点是什么？`,goal:"业务上希望它优先提升什么结果？效率、质量、转化、留存还是满意度？",scope:"MVP 第一版只做哪 3 个核心动作？哪些能力明确不做？",metric:`怎么判断这个功能有效？是否可以用「${preset.primaryMetric}」作为核心指标？`,risk:"AI 建议失败、内容误判、用户误用时，产品需要给出什么边界和兜底？",validation:"上线前怎么验收？哪些用户路径、异常状态和边界样例必须通过？"};return missing.slice(0,6).map(i=>base[i.key])}function renderClarify(c,questions,card){const missingHtml=c.missing.length?c.missing.map(i=>`<li><strong>${i.label}</strong>当前需求中没有明确表达，建议评审前补充。</li>`).join(""):`<li><strong>信息较完整</strong>当前需求已经覆盖主要 PRD 要素，可以进入方案细化。</li>`;$("clarifyStatus").textContent=`成熟度 ${c.score}/100`;$("clarifyResult").innerHTML=`<div class="score-board"><div class="score-card"><span class="score-label">需求成熟度</span><div class="score-value">${c.score}</div><p>置信度：${card.confidence}。分数越高，越适合进入 PRD 评审。</p><div class="meter"><span style="width:${c.score}%"></span></div></div><div class="score-card"><span class="score-label">已识别要素</span><div class="chips">${c.matched.filter(i=>i.hit).map(i=>`<span class="chip">${i.label}</span>`).join("")||`<span class="chip">仅有初始想法</span>`}</div></div></div><div class="block"><h3>缺失信息</h3><ul class="list">${missingHtml}</ul></div><div class="block"><h3>建议追问</h3><ul class="list">${questions.map(q=>`<li class="question"><span>${escapeHtml(q)}</span></li>`).join("")}</ul></div><div class="block"><h3>需求卡</h3><ul class="list"><li><strong>用户</strong>${escapeHtml(card.user)}</li><li><strong>问题</strong>${escapeHtml(card.problem)}</li><li><strong>目标</strong>${escapeHtml(card.goal)}</li><li><strong>MVP</strong>${card.mvp.map(escapeHtml).join("；")}</li><li><strong>核心指标</strong>${escapeHtml(card.metric)}</li></ul></div>`}function prdSections(feature,domain,stage,preset,questions){return[{title:"1. 背景与问题",body:`${domain}场景下，用户已经有明确的使用动机，但原始需求仍然偏模糊。当前要解决的核心问题是：${preset.problem} 因此，本功能需要先把用户输入转化为清晰判断，再输出可执行建议。`},{title:"2. 目标用户",list:[`核心用户：${preset.user}`,"次级用户：需要参与评审、运营、数据复盘或内容审核的协作角色",`当前需求阶段：${stage}`]},{title:"3. 用户场景",list:[`用户产生一个关于「${feature}」的想法，但尚未明确功能边界和成功标准。`,"用户希望快速判断这个需求是否足够进入评审。","用户需要把想法整理成研发、设计、运营都能理解的 PRD 草稿。"]},{title:"4. 产品目标",list:[preset.goal,"降低需求澄清和文档整理成本。","让需求从一句话想法变成可以评审、可以开发、可以验证的结构化方案。"]},{title:"5. MVP 功能范围",list:["输入一句话需求和补充背景。","识别需求完整度，并指出缺失信息。","生成建议追问问题。","生成需求卡。","生成 PRD 草稿、指标和验收标准。"]},{title:"6. 用户流程",list:["输入模糊需求和已知背景。","系统分析需求成熟度。","系统输出缺失信息与追问清单。","用户根据澄清结果补充需求。","系统生成可复制的 PRD 草稿。","用户将 PRD 带入评审或继续迭代。"]},{title:"7. 功能需求",list:["需求输入：支持填写一句话需求、业务场景、需求阶段和补充信息。","成熟度评分：基于目标用户、痛点、目标、范围、指标、风险、验收标准等要素计算分数。","缺失信息识别：列出当前需求未覆盖的 PRD 要素。","追问生成：根据缺失项生成产品经理应继续追问的问题。","PRD 生成：自动生成包含背景、目标、流程、指标、风险和验收标准的结构化文档。","复制与导出：支持复制 PRD 和导出 Markdown。"]},{title:"8. 指标体系",list:[`北极星指标：${preset.primaryMetric}`,"过程指标：需求输入完成率、澄清问题查看率、PRD 复制率、导出率。","质量指标：需求成熟度提升率、评审一次通过率、PRD 缺失项减少数量。","体验指标：生成耗时、复制成功率、用户满意度。"]},{title:"9. 风险与边界",list:["当前版本基于规则和模板生成，不代表真实 AI 理解能力。","系统输出的是 PRD 草稿，仍需要产品经理结合业务判断确认。","模糊输入可能导致用户、目标和指标推断不准确。","涉及高风险业务时，需要人工补充合规、权限和异常状态设计。"]},{title:"10. 验收标准",list:["空输入时能提示用户补充需求。","输入模糊需求后能输出成熟度评分。","缺失信息不少于 3 类时，能生成对应追问问题。","PRD 至少包含背景、用户、目标、流程、指标、风险和验收标准。","复制和导出 Markdown 功能可用。","移动端页面不出现主要内容遮挡。"]},{title:"11. 待澄清问题",list:questions.length?questions:["当前需求信息较完整，下一步建议进入业务评审和原型设计。"]}]}function toMarkdown(title,sections){return[`# PRD：${title}`,"",...sections.flatMap(s=>s.list?[`## ${s.title}`,"",...s.list.map(i=>`- ${i}`),""]:[`## ${s.title}`,"",s.body,""])].join("\n")}function renderPrd(feature,sections){latestPrdMarkdown=toMarkdown(feature,sections);$("prdResult").innerHTML=sections.map(s=>`<section class="prd-section"><h3>${escapeHtml(s.title)}</h3>${s.list?`<ul>${s.list.map(i=>`<li>${escapeHtml(i)}</li>`).join("")}</ul>`:`<p>${escapeHtml(s.body)}</p>`}</section>`).join("")}function build(){const rawNeed=$("rawNeed").value.trim(),knownInfo=$("knownInfo").value.trim(),domain=$("domain").value,stage=$("stage").value,preset=domainPresets[domain]||domainPresets["其他"];if(!rawNeed){$("clarifyStatus").textContent="等待输入";$("clarifyResult").innerHTML=`<div class="empty">请先输入一句模糊需求。</div>`;$("prdResult").innerHTML=`<div class="empty">输入需求后，PRD 会在这里生成。</div>`;latestPrdMarkdown="";return}const c=analyzeCompleteness(`${rawNeed}\n${knownInfo}\n${domain}\n${stage}`),feature=extractFeature(rawNeed,domain),card={user:preset.user,problem:preset.problem,goal:preset.goal,mvp:[`用户输入与「${feature}」相关的基础信息`,"系统生成结构化分析结果和可执行建议","用户可以复制、保存或进入下一步评审"],metric:preset.primaryMetric,confidence:c.score>=75?"较高":c.score>=55?"中等":"偏低"},questions=buildQuestions(c.missing,preset,feature),sections=prdSections(feature,domain,stage,preset,questions);renderClarify(c,questions,card);renderPrd(feature,sections)}function copyPrd(){if(!latestPrdMarkdown)return;const t=document.createElement("textarea");t.value=latestPrdMarkdown;document.body.appendChild(t);t.select();document.execCommand("copy");t.remove();$("copyPrdBtn").textContent="已复制";setTimeout(()=>$("copyPrdBtn").textContent="复制 PRD",1200)}function downloadMarkdown(){if(!latestPrdMarkdown)return;const blob=new Blob([latestPrdMarkdown],{type:"text/markdown;charset=utf-8"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="prd-copilot-output.md";a.click();URL.revokeObjectURL(url)}$("analyzeBtn").addEventListener("click",build);$("sampleBtn").addEventListener("click",()=>loadCase(caseIndex+1));$("copyPrdBtn").addEventListener("click",copyPrd);$("downloadBtn").addEventListener("click",downloadMarkdown);</script></body></html>
